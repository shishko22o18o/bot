<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bau28Store · Магазин в Telegram</title>
    <style>
        :root {
            --bg-color: #0d0914;
            --primary: #b829ff;
            --primary-glow: rgba(184, 41, 255, 0.4);
            --secondary: #8a2be2;
            --surface: rgba(25, 18, 35, 0.6);
            --surface-border: rgba(184, 41, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #a097b0;
            --danger: #ff4444;
            --heart: #ff4081;
            --success: #4caf50;
            --gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: var(--bg-color);
            color: var(--text-main);
            position: relative;
            overflow-x: hidden;
        }

        .bg-custom {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: url('images/fon.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        ::-webkit-scrollbar { display: none; }
        
        .app {
            position: relative;
            z-index: 10;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 16px 90px;
        }

        .header {
            display: flex;
            justify-content: center; /* центрируем лого */
            margin-bottom: 24px;
        }

        .logo img {
            max-width: 100%; /* растягиваем на всю ширину */
            height: auto;
            max-height: 80px; /* ограничим высоту */
            border-radius: 12px;
            box-shadow: 0 0 10px #b829ff, 0 0 20px #b829ff, 0 0 30px #b829ff;
            animation: neonPulse 2s infinite ease-in-out;
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 5px #b829ff, 0 0 10px #b829ff, 0 0 15px #b829ff; }
            50% { box-shadow: 0 0 15px #b829ff, 0 0 25px #b829ff, 0 0 35px #b829ff; }
            100% { box-shadow: 0 0 5px #b829ff, 0 0 10px #b829ff, 0 0 15px #b829ff; }
        }

        /* Анимации кнопок (без прыжков) */
        .btn-add, .btn-fav, .hotbar-btn, .pill, .cat-btn, .spin-btn-modern, .promo-btn-modern, .order-btn-modern, .close-btn, .remove-fav {
            transition: background 0.2s, filter 0.2s, box-shadow 0.2s;
        }
        .btn-add:hover, .btn-fav:hover, .hotbar-btn:hover, .pill:hover, .cat-btn:hover, .spin-btn-modern:hover, .promo-btn-modern:hover, .order-btn-modern:hover, .close-btn:hover, .remove-fav:hover {
            filter: brightness(1.2);
        }
        .btn-add:active, .btn-fav:active, .hotbar-btn:active, .pill:active, .cat-btn:active, .spin-btn-modern:active, .promo-btn-modern:active, .order-btn-modern:active, .close-btn:active, .remove-fav:active {
            filter: brightness(1.4);
            transform: scale(0.98);
        }

        .categories,
        .pills-container {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(13, 9, 20, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 0;
            margin-top: -10px;
        }
        .categories {
            top: 0;
        }
        .pills-container {
            top: 60px;
        }

        .categories {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 10px;
        }

        .cat-btn {
            flex: 0 0 110px;
            scroll-snap-align: start;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 1/1.2;
            background-size: cover;
            background-position: center;
            border: 2px solid transparent;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 10px;
        }

        .cat-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.1) 100%);
            z-index: 1;
        }

        .cat-btn span {
            position: relative;
            z-index: 2;
            color: white;
            font-weight: 700;
            font-size: 13px;
            text-align: center;
        }

        .cat-btn.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
            transform: translateY(-3px);
        }

        .cat-btn[data-cat="clothes"] { background-image: url('images/cat_odezhda.jpg'); }
        .cat-btn[data-cat="accessories"] { background-image: url('images/cat_aksessuary.jpg'); }
        .cat-btn[data-cat="vape"] { background-image: url('images/cat_vape.jpg'); }
        .cat-btn[data-cat="electronics"] { background-image: url('images/cat_elektronika.jpg'); }

        .pills-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            margin-bottom: 20px;
            padding-bottom: 5px;
        }

        .pill {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--surface-border);
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
        }

        .pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px var(--primary-glow);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 10px;
        }

        .product-card {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.4s ease forwards;
            width: 100%;
            height: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .product-card:active { transform: scale(0.97); transition: transform 0.1s; }

      

        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .discount-badge {
            position: absolute;
            top: 10px; left: 10px;
            background: var(--danger);
            color: white;
            font-size: 11px;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 12px;
        }

        .product-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-height: 120px;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-description {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 8px;
            word-wrap: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .product-price {
            color: #dbb6ff;
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .old-price {
            text-decoration: line-through;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 12px;
            margin-right: 6px;
        }

        .product-actions {
            display: flex;
            gap: 8px;
            margin-top: auto;
        }

        .btn-add {
            flex-grow: 1;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            font-weight: 700;
            font-size: 13px;
            padding: 10px;
            border-radius: 14px;
            cursor: pointer;
            min-width: 0;
        }

        .btn-fav {
            background: rgba(255,255,255,0.1);
            border: none;
            width: 38px; height: 38px;
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Хотбар с иконками JPG */
        .hotbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20, 15, 28, 0.9);
            backdrop-filter: blur(20px);
            border-top: 2px solid var(--primary);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 0 12px;
            z-index: 150;
            box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.5);
        }

        .hotbar-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: relative;
            min-width: 60px;
        }

        .hotbar-icon-img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            margin-bottom: 2px;
            filter: brightness(0.8);
        }
        .hotbar-btn:hover .hotbar-icon-img {
            filter: brightness(1);
        }

        .hotbar-label {
            font-size: 11px;
        }

        .hotbar-badge {
            position: absolute;
            top: -2px;
            right: -5px;
            background: var(--heart);
            color: white;
            font-size: 10px;
            font-weight: 800;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 3px;
            border: 1px solid var(--bg-color);
        }

        /* Модалки */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .bottom-sheet {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%;
            background: #1a1122;
            border-radius: 32px 32px 0 0;
            border-top: 2px solid var(--primary);
            padding: 24px 20px 40px;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }

        .sheet-handle {
            width: 40px; height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin: 0 auto 20px;
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 20px;
        }

        .close-btn {
            background: rgba(255,255,255,0.1);
            border: none; color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
        }

        .sheet-body {
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 5px;
            min-height: 0;
        }

        .cart-item-modern {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 12px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            border: 1px solid var(--surface-border);
        }

        .cart-item-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-item-emoji {
            font-size: 32px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 4px;
        }

        .cart-item-info {
            display: flex;
            flex-direction: column;
        }

        .cart-item-name {
            font-weight: 600;
            font-size: 15px;
        }

        .cart-item-price {
            color: var(--primary);
            font-weight: 700;
            font-size: 14px;
        }

        .cart-item-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qty-modern {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.5);
            border-radius: 40px;
            padding: 4px;
        }

        .qty-modern button {
            background: none;
            border: none;
            color: white;
            width: 30px; height: 30px;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            font-size: 18px;
        }
        .qty-modern button:active { background: rgba(255,255,255,0.1); }

        .qty-modern span {
            min-width: 30px;
            text-align: center;
            font-weight: 600;
        }

        .remove-item-modern {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            width: 36px; height: 36px;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
        }
        .remove-item-modern:active { background: rgba(255,255,255,0.1); }

        .remove-fav {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            width: 36px; height: 36px;
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin-left: 10px;
        }
        .remove-fav:active { background: rgba(255,255,255,0.1); }

        .promo-section-modern {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .promo-input-modern {
            flex: 2;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--surface-border);
            border-radius: 30px;
            padding: 14px 18px;
            color: white;
            font-size: 14px;
        }

        .promo-btn-modern {
            background: var(--secondary);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            font-size: 16px;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: 800;
            margin-top: 10px;
            padding-top: 15px;
            border-top: 2px solid rgba(255,255,255,0.1);
        }

        .order-btn-modern {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 800;
            font-size: 18px;
            padding: 18px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(184, 41, 255, 0.4);
        }

        .wheel-container {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .wheel-canvas {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: conic-gradient(
                #ffffff 0deg 45deg,
                #b829ff 45deg 90deg,
                #000000 90deg 135deg,
                #ffffff 135deg 180deg,
                #b829ff 180deg 225deg,
                #000000 225deg 270deg,
                #ffffff 270deg 315deg,
                #b829ff 315deg 360deg
            );
            margin: 0 auto 20px;
            position: relative;
            transition: transform 3s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        .wheel-pointer {
            width: 0; height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid gold;
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        .spin-btn-modern {
            background: var(--primary);
            border: none;
            color: white;
            font-weight: 700;
            padding: 14px 30px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(184, 41, 255, 0.4);
        }


        .product-carousel {
    position: relative;
    width: 100%;
    aspect-ratio: 1/1;
    background: #1a0a24;
    overflow: hidden;
}

.carousel-images {
    width: 100%;
    height: 100%;
    position: relative;
}

.carousel-img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* чтобы фото не обрезалось */
    background: #1a0a24;
    position: absolute;
    top: 0;
    left: 0;
    transition: opacity 0.3s;
}

.carousel-indicators {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 2;
}

.carousel-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: background 0.2s;
}

.carousel-dot.active {
    background: var(--primary);
    box-shadow: 0 0 10px var(--primary);
}

/* Стрелки в модалке */
.modal-prev, .modal-next {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.5);
    color: white;
    border: none;
    font-size: 32px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s;
}
.modal-prev { left: 10px; }
.modal-next { right: 10px; }
.modal-prev:hover, .modal-next:hover {
    background: rgba(0,0,0,0.8);
}
        
        .prize-result {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 800;
            color: var(--gold);
        }

        .notification {
            position: fixed;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            backdrop-filter: blur(10px);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            z-index: 1000;
            transition: 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .notification.show { top: 20px; }
    </style>
</head>
<body>
    <div class="bg-custom"></div>

    <div class="app">
        <div class="header">
            <div class="logo">
                <img src="images/logo.jpg" alt="Bau28">
            </div>
        </div>

        <div class="categories" id="categories">
            <div class="cat-btn active" data-cat="clothes"><span>Одежда</span></div>
            <div class="cat-btn" data-cat="accessories"><span>Аксессуары</span></div>
            <div class="cat-btn" data-cat="vape"><span>VAPE</span></div>
            <div class="cat-btn" data-cat="electronics"><span>Электроника</span></div>
        </div>

        <div class="pills-container" id="vapeSubcats" style="display: none;">
            <div class="pill active" data-sub="liquids">Жидкости</div>
            <div class="pill" data-sub="consumables">Расходники</div>
            <div class="pill" data-sub="disposable">Одноразки</div>
            <div class="pill" data-sub="pods">POD-системы</div>
        </div>

        <div class="pills-container" id="filters">
            <div class="pill active" data-filter="all">Все</div>
            <div class="pill" data-filter="sale">🔥 Скидки</div>
            <div class="pill" data-filter="new">Новинки</div>
            <div class="pill" data-filter="priceAsc">Сначала дешевле</div>
            <div class="pill" data-filter="priceDesc">Сначала дороже</div>
        </div>

        <div class="products-grid" id="productsGrid"></div>
    </div>

    <!-- Модалка корзины -->
    <div class="modal-overlay" id="cartModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span>🛒 Твоя корзина</span>
                <button class="close-btn" id="closeCartBtn">✕</button>
            </div>
            <div class="sheet-body" id="cartItems"></div>
            <div class="promo-section-modern">
                <input type="text" class="promo-input-modern" id="promoCode" placeholder="Промокод">
                <button class="promo-btn-modern" id="applyPromo">Применить</button>
            </div>
            <div id="promoMessage" style="color: #ffaa00; font-size: 13px; margin-bottom: 10px;"></div>
            <div class="summary-row" id="discountRow" style="display: none;">
                <span>Скидка:</span>
                <span id="discountAmount">0 ₽</span>
            </div>
            <div class="total-row">
                <span>Итого:</span>
                <span id="modalTotal">0 ₽</span>
            </div>
            <button class="order-btn-modern" id="orderBtn">Оформить заказ</button>
        </div>
    </div>

    <!-- Модалка избранного -->
    <div class="modal-overlay" id="favModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span>❤️ Избранное</span>
                <button class="close-btn" id="closeFavBtn">✕</button>
            </div>
            <div class="sheet-body" id="favItems"></div>
        </div>
    </div>

    <!-- Модалка колеса фортуны -->
    <div class="modal-overlay" id="wheelModal">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-header">
                <span>🎁 Колесо фортуны</span>
                <button class="close-btn" id="closeWheelBtn">✕</button>
            </div>
            <div class="sheet-body">
                <div class="wheel-container">
                    <div class="wheel-pointer"></div>
                    <div class="wheel-canvas" id="wheel"></div>
                    <input type="text" class="promo-input-modern" id="wheelPromoCode" placeholder="Введите промокод для колеса" style="margin-bottom: 15px;">
                    <button class="spin-btn-modern" id="spinWheel">Крутить</button>
                    <div class="prize-result" id="wheelResult"></div>
                </div>
            </div>
        </div>

           function renderProducts() {
    let items = currentCat === 'vape' ? (products.vape?.[currentSub] || []) : (products[currentCat] || []);

    // Применяем фильтры
    if (currentFilter === 'sale') {
        items = items.filter(p => p.discount && p.discount > 0);
    } else if (currentFilter === 'new') {
        items = items.filter(p => p.isNew === true);
    } else if (currentFilter === 'priceAsc') {
        items = [...items].sort((a,b) => {
            const pa = a.discount ? Math.round(a.price * (1 - a.discount/100)) : a.price;
            const pb = b.discount ? Math.round(b.price * (1 - b.discount/100)) : b.price;
            return pa - pb;
        });
    } else if (currentFilter === 'priceDesc') {
        items = [...items].sort((a,b) => {
            const pa = a.discount ? Math.round(a.price * (1 - a.discount/100)) : a.price;
            const pb = b.discount ? Math.round(b.price * (1 - b.discount/100)) : b.price;
            return pb - pa;
        });
    }

    if (items.length === 0) {
        productsGrid.innerHTML = '<div style="grid-column: span 2; text-align:center; color:var(--text-muted); padding:40px;">Товары не найдены</div>';

        const finalPrice = p.discount ? Math.round(p.price * (1 - p.discount/100)) : p.price;

        const images = p.images && p.images.length ? p.images : [p.img || 'images/tovary/default.jpg'];

            if (images.length > 1) {
                carouselIndicators += `<span class="carousel-dot ${idx === 0 ? 'active' : ''}" data-index="${idx}"></span>`;
            }
        });

        return `
            <div class="product-card" data-id="${p.id}">
                <div class="product-carousel" data-product-id="${p.id}">
                    <div class="carousel-images">

                        <button class="btn-fav" data-id="${p.id}">${isFav ? '❤️' : '🤍'}</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    // Добавляем обработчики на карточки и кнопки
    document.querySelectorAll('.product-card').forEach(card => {
        card.addEventListener('click', (e) => {
            if (!e.target.closest('button')) {

                if (product) {

    document.querySelectorAll('.btn-add[data-id]').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = btn.dataset.id;

            // Корзина
            window.changeQty = function(id, delta) {
                const item = cart.find(i => i.id === id);
                if (item) {
                    item.quantity += delta;
                    if (item.quantity <= 0) cart = cart.filter(i => i.id !== id);
                    updateCart();
                }
            };

            function addToCart(product, qty = 1) {
                const existing = cart.find(i => i.id === product.id);
                if (existing) {
                    existing.quantity += qty;
                } else {
                    cart.push({ 
                        id: product.id, 
                        name: product.name, 
                        price: product.discount ? Math.round(product.price * (1 - product.discount/100)) : product.price, 
                        quantity: qty 
                    });
                }
                updateCart();
                showNotification('✅ Добавлено в корзину');
            }

            function updateCart() {
                localStorage.setItem('bau28_cart', JSON.stringify(cart));
                let subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
                let promoDiscount = 0;
                if (appliedPromo && appliedPromo.type === 'discount') {
                    if (appliedPromo.discount_type === 'percent') {
                        promoDiscount = Math.round(subtotal * appliedPromo.discount / 100);
                    } else {
                        promoDiscount = appliedPromo.discount;
                    }
                }
                let total = subtotal - promoDiscount - wheelDiscount;
                if (total < 0) total = 0;

                const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
                if (hotbarCartBadge) hotbarCartBadge.textContent = totalItems;
                if (modalTotalSpan) modalTotalSpan.textContent = formatPrice(total);

                if (promoDiscount > 0 || wheelDiscount > 0) {
                    discountRow.style.display = 'flex';
                    discountAmountSpan.textContent = `-${formatPrice(promoDiscount + wheelDiscount)}`;
                } else {
                    discountRow.style.display = 'none';
                }

                renderCartItems();
            }

            function renderCartItems() {
                if (!cartItemsDiv) return;
                if (cart.length === 0) {
                    cartItemsDiv.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Корзина пуста</div>';
                    return;
                }
                cartItemsDiv.innerHTML = cart.map(item => `
                    <div class="cart-item-modern">
                        <div class="cart-item-left">
                            <span class="cart-item-emoji">🛍️</span>

                                <span>${item.quantity}</span>
                                <button onclick="changeQty('${item.id}', 1)">+</button>
                            </div>
                            <button class="remove-item-modern" onclick="removeFromCart('${item.id}')">✕</button>
                        </div>
                    </div>
                `).join('');
            }

            applyPromoBtn.addEventListener('click', async () => {
                const code = promoInput.value.trim().toUpperCase();
                if (!code) {
                    promoMessage.textContent = 'Введите код';
                    return;

                        promoMessage.textContent = data.error || 'Неверный код';
                    }
                } catch (e) {
                    appliedPromo = null;
                    promoMessage.textContent = 'Ошибка сервера';
                }
                updateCart();
            });

            // Колесо фортуны
            async function fetchWheelPrizes() {
                try {
                    const response = await fetch(`${API_BASE_URL}/api/wheel/prizes`);
                    if (response.ok) {
                        wheelPrizes = await response.json();
                    }
                } catch (e) {
                    console.warn('Не удалось загрузить призы колеса');
                }
            }

            spinBtn.addEventListener('click', async () => {
                const code = wheelPromoInput.value.trim().toUpperCase();
                if (!code) {
                    wheelResultDiv.textContent = 'Введите промокод для колеса';
                    return;
                }
                try {
                    const resp = await fetch(`${API_BASE_URL}/api/check_promo`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ code })
                    });
                    const data = await resp.json();
                    if (!data.valid || data.type !== 'wheel') {
                        wheelResultDiv.textContent = 'Неверный промокод для колеса';
                        return;
                    }
                } catch (e) {
                    wheelResultDiv.textContent = 'Ошибка проверки промокода';
                    return;
                }

                if (wheelPrizes.length === 0) {
                    wheelResultDiv.textContent = 'Нет доступных призов';
                    return;
                }

                const rotations = 5 + Math.random() * 3;
                const degrees = rotations * 360 + Math.random() * 360;
                wheel.style.transform = `rotate(${degrees}deg)`;

                setTimeout(() => {
                    const totalWeight = wheelPrizes.reduce((s, p) => s + (p.probability || 1), 0);
                    let rand = Math.random() * totalWeight;
                    let selected = null;
                    for (let p of wheelPrizes) {
                        if (rand < (p.probability || 1)) {
                            selected = p;
                            break;
                        }
                        rand -= (p.probability || 1);
                    }
                    if (!selected) selected = wheelPrizes[0];

                    if (selected.type === 'percent') {
                        const subtotal = cart.reduce((s, i) => s + i.price * i.quantity, 0);
                        wheelDiscount = Math.round(subtotal * selected.value / 100);
                    } else if (selected.type === 'fixed') {
                        wheelDiscount = selected.value;
                    } else {
                        wheelDiscount = 0;
                    }

                    wheelResultDiv.innerHTML = `🎉 Ваш приз: ${selected.icon || '🎁'} ${selected.description}!`;
                    addHistory('Колесо фортуны', selected.description);
                    updateCart();
                }, 3000);
            });

            // Избранное
            function toggleFavorite(product) {
                const id = product.id;
                const index = favorites.indexOf(id);
                if (index === -1) {
                    favorites.push(id);
                } else {
                    favorites.splice(index, 1);
                }
                localStorage.setItem('bau28_fav', JSON.stringify(favorites));
                updateFavBadge();
                renderProducts();
            }

            function updateFavBadge() {
                if (hotbarFavBadge) hotbarFavBadge.textContent = favorites.length;
            }

            function renderFavItems() {
                const container = document.getElementById('favItems');
                if (!container) return;
                if (favorites.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:20px;">Нет избранных</div>';
                    return;
                }

                let html = '';
                favorites.forEach(id => {
                    let product = null;
                    for (let cat in products) {
                        if (cat === 'vape') {
                            for (let sub in products.vape) {
                                const found = products.vape[sub]?.find(p => p.id === id);
                                if (found) {
                                    product = found;
                                    break;
                                }
                            }
                        } else {
                            const found = products[cat]?.find(p => p.id === id);
                            if (found) {
                                product = found;
                                break;
                            }
                        }
                        if (product) break;
                    }

                    if (!product) {
                        favorites = favorites.filter(fid => fid !== id);
                        localStorage.setItem('bau28_fav', JSON.stringify(favorites));
                        updateFavBadge();
                        return;
                    }

                    const price = product.discount ? Math.round(product.price * (1 - product.discount/100)) : product.price;
                    html += `
                        <div class="cart-item-modern">
                            <div class="cart-item-left">
                                <span class="cart-item-emoji">🛍️</span>
                                <div class="cart-item-info">
                                    <span class="cart-item-name">${product.name}</span>
                                    <span class="cart-item-price">${formatPrice(price)}</span>
                                </div>
                            </div>
                            <div style="display: flex; align-items: center;">
                                <button class="btn-add" style="width:auto; padding:8px 16px; margin-right:8px;" data-id="${product.id}">В корзину</button>
                                <button class="remove-fav" data-id="${product.id}">✕</button>
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;
                container.querySelectorAll('.btn-add').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const product = findProduct(id);
                        if (product) {
                            addToCart(product);
                            addHistory('Добавление в корзину (из избранного)', product.name, product.id);
                        }
                    });
                });
                container.querySelectorAll('.remove-fav').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        const product = findProduct(id);
                        if (product) {
                            toggleFavorite(product);
                            addHistory('Удаление из избранного', product.name, product.id);
                            renderFavItems();
                        }
                    });
                });
            }

            // История
            function renderHistoryItems() {
                const container = document.getElementById('historyItems');
                if (!container) return;
                if (history.length === 0) {
                    container.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:20px;">История пуста</div>';
                    return;
                }
                container.innerHTML = history.map(entry => `
                    <div class="cart-item-modern" style="flex-direction: column; align-items: flex-start;">
                        <div style="display: flex; justify-content: space-between; width:100%;">
                            <span style="font-weight:600;">${entry.action}</span>
                            <span style="color:var(--text-muted); font-size:10px;">${entry.timestamp}</span>
                        </div>
                        ${entry.productName ? `<div style="color:var(--primary); font-size:14px; margin-top:4px;">${entry.productName}</div>` : ''}
                    </div>
                `).join('');
            }

            // Отправка заказа
            orderBtn.addEventListener('click', async () => {
                if (cart.length === 0) return;

                const subtotal = cart.reduce((s,i) => s + i.price*i.quantity, 0);
                const promoDiscount = appliedPromo && appliedPromo.type === 'discount' ? 
                    (appliedPromo.discount_type === 'percent' ? Math.round(subtotal * appliedPromo.discount / 100) : appliedPromo.discount) : 0;
                const total = subtotal - promoDiscount - wheelDiscount;

                const orderData = {
                    items: cart.map(item => ({
                        id: item.id,
                        name: item.name,
                        quantity: item.quantity,
                        price: item.price
                    })),
                    total: total,
                    promo: appliedPromo ? appliedPromo.code : undefined,
                    wheel_discount: wheelDiscount
                };

                const tg = window.Telegram?.WebApp;
                if (tg && tg.sendData) {
                    tg.sendData(JSON.stringify(orderData));
                } else {
                    alert('Тестовый режим. Заказ: ' + JSON.stringify(orderData));
                }

                if (API_BASE_URL) {
                    try {
                        await fetch(`${API_BASE_URL}/api/order`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderData)
                        });
                    } catch (error) {
                        console.error('Не удалось отправить заказ на сервер:', error);
                    }
                }

                addHistory('Оформление заказа', `Сумма: ${formatPrice(total)}`);

                cart = [];
                appliedPromo = null;
                wheelDiscount = 0;
                promoInput.value = '';
                promoMessage.textContent = '';
                updateCart();
                cartModal.classList.remove('active');
                showNotification('🚀 Заказ оформлен!');
            });

            // Модалки через хотбар
            hotbarCart.addEventListener('click', () => {
                renderCartItems();
                cartModal.classList.add('active');
            });

            hotbarFav.addEventListener('click', () => {
                renderFavItems();
                favModal.classList.add('active');
            });

            hotbarWheel.addEventListener('click', () => {
                wheelModal.classList.add('active');
                fetchWheelPrizes();
            });

            hotbarHistory.addEventListener('click', () => {
                renderHistoryItems();
                historyModal.classList.add('active');
            });

            // Закрытие модалок
            closeCartBtn.addEventListener('click', () => cartModal.classList.remove('active'));
            closeFavBtn.addEventListener('click', () => favModal.classList.remove('active'));
            closeWheelBtn.addEventListener('click', () => wheelModal.classList.remove('active'));
            closeHistoryBtn.addEventListener('click', () => historyModal.classList.remove('active'));

            // Закрытие свайпом вниз
            const sheets = [cartModal, favModal, wheelModal, productModal, historyModal];
            sheets.forEach(modal => {
                if (!modal) return;
                let startY = 0;
                const sheet = modal.querySelector('.bottom-sheet');
                if (!sheet) return;

                modal.addEventListener('touchstart', (e) => {
                    if (e.target === modal) return;
                    const touch = e.touches[0];
                    startY = touch.clientY;
                }, { passive: true });

                modal.addEventListener('touchmove', (e) => {
                    if (startY === 0) return;
                    const touch = e.touches[0];
                    const diff = touch.clientY - startY;
                    if (diff > 50) {
                        modal.classList.remove('active');
                        startY = 0;
                    }
                }, { passive: true });

                modal.addEventListener('touchend', () => {
                    startY = 0;
                });
            });

            // Закрытие по клику на оверлей
            [cartModal, favModal, wheelModal, productModal, historyModal].forEach(modal => {
                if (!modal) return;
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) modal.classList.remove('active');
                });
            });

            // Навигация по категориям
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCat = btn.dataset.cat;
                    const vapeSubcats = document.getElementById('vapeSubcats');
                    if (vapeSubcats) vapeSubcats.style.display = currentCat === 'vape' ? 'flex' : 'none';
                    if (currentCat === 'vape') currentSub = 'liquids';
                    renderProducts();
                });
            });

            // Подкатегории VAPE (исправлено)
            document.querySelectorAll('#vapeSubcats .pill').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const parent = btn.parentElement;
                    parent.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSub = btn.dataset.sub;
                    renderProducts();
                });
            });

            document.querySelectorAll('#filters .pill').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const parent = btn.parentElement;
                    parent.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (btn.dataset.filter) currentFilter = btn.dataset.filter;
                    renderProducts();
                });
            });

            function initCarousels() {
    document.querySelectorAll('.product-carousel').forEach(carousel => {
        let startX = 0;
        let currentIndex = 0;
        const images = carousel.querySelectorAll('.carousel-img');
        const dots = carousel.querySelectorAll('.carousel-dot');
        
        if (images.length === 0) return;

        const showImage = (index) => {
            if (index < 0) index = images.length - 1;
            if (index >= images.length) index = 0;
            currentIndex = index;
            images.forEach((img, i) => {
                img.style.display = i === currentIndex ? 'block' : 'none';
            });
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentIndex);
            });
        };

        // Обработка свайпов
        carousel.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
        }, { passive: true });

        carousel.addEventListener('touchend', (e) => {
            if (!startX) return;
            const endX = e.changedTouches[0].clientX;
            const diff = endX - startX;
            if (Math.abs(diff) > 30) {
                if (diff > 0) {
                    showImage(currentIndex - 1); // свайп вправо – предыдущее
                } else {
                    showImage(currentIndex + 1); // свайп влево – следующее
                }
            }
            startX = 0;
        }, { passive: true });

        // Обработка кликов по точкам
        dots.forEach(dot => {
            dot.addEventListener('click', (e) => {
                e.stopPropagation();
                const index = parseInt(dot.dataset.index);
                showImage(index);
            });
        });

        // Сохраняем текущий индекс для возможного использования
        carousel.dataset.currentIndex = 0;
    });
}
            
            // Инициализация
            (async () => {
                await loadProducts();
                updateCart();
                updateFavBadge();
            })();

            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                window.Telegram.WebApp.setHeaderColor('#0d0914');
            }
        });
    </script>
</body>
</html>
